<style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black:   #080305;
            --dark:    #110710;
            --red:     #C41230;
            --red-dim: #7A0B1E;
            --gold:    #D4AF37;
            --gold-dim:#8A6F1A;
            --white:   #F5E8EA;
            --muted:   #8C6A6F;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── CANVAS BACKGROUND ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── NOISE OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ── WRAPPER ── */
        .page { position: relative; z-index: 1; }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px 40px;
            text-align: center;
            position: relative;
        }

        .hero-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.8s 0.2s forwards;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6.5rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -1px;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.8s 0.4s forwards;
        }

        .hero-title .accent {
            display: block;
            background: linear-gradient(135deg, var(--red) 0%, #FF4060 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: var(--muted);
            max-width: 480px;
            line-height: 1.8;
            margin-bottom: 48px;
            font-weight: 400;
            opacity: 0;
            animation: fadeUp 0.8s 0.6s forwards;
        }

        /* ── TEASER CARDS ── */
        .teaser-row {
            display: flex;
            gap: 12px;
            margin-bottom: 52px;
            opacity: 0;
            animation: fadeUp 0.8s 0.8s forwards;
        }

        .teaser-card {
            width: 80px;
            height: 110px;
            border-radius: 12px;
            border: 1px solid rgba(196,18,48,0.3);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--dark);
        }

        .teaser-card:nth-child(2) {
            width: 80px;
            height: 130px;
            margin-top: -10px;
        }

        .teaser-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            filter: blur(6px) brightness(0.55);
            transform: scale(1.15);
        }

        .teaser-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8,3,5,0.35);
            z-index: 1;
        }

        .teaser-card .lock {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 1.4rem;
            z-index: 2;
        }

        .teaser-card .lock span {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            font-weight: 600;
        }

        /* shimmer on cards */
        .teaser-card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 60%;
            height: 200%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.07) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @pragma shimmer {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(400%) translateY(100%); }
        }

        /* ── CTA BUTTON ── */
        .cta-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0;
            animation: fadeUp 0.8s 1s forwards;
        }

        .btn-tg {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(135deg, var(--red) 0%, #9B0F26 100%);
            color: #fff;
            padding: 20px 44px;
            border-radius: 60px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow:
                0 0 0 0 rgba(196,18,48,0.4),
                0 20px 60px rgba(196,18,48,0.35);
            transition: all 0.3s ease;
            animation: pulse 2.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .btn-tg::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.4s ease;
        }

        .btn-tg:hover::before { left: 100%; }

        .btn-tg:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 0 0 rgba(196,18,48,0), 0 30px 80px rgba(196,18,48,0.5);
            animation: none;
        }

        .btn-tg svg { width: 24px; height: 24px; flex-shrink: 0; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(196,18,48,0.4), 0 20px 60px rgba(196,18,48,0.35); }
            50% { box-shadow: 0 0 0 12px rgba(196,18,48,0), 0 20px 60px rgba(196,18,48,0.5); }
        }

        .cta-note {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cta-note::before, .cta-note::after {
            content: '';
            width: 30px;
            height: 1px;
            background: var(--muted);
            opacity: 0.4;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
        }

        /* ── STATS ── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 60px 24px;
            max-width: 700px;
            margin: 0 auto;
        }

        .stat {
            flex: 1;
            text-align: center;
            padding: 0 20px;
            position: relative;
        }

        .stat + .stat::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 1px;
            background: linear-gradient(180deg, transparent, var(--red-dim), transparent);
        }

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--white), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            font-weight: 500;
        }

        /* ── FEATURES ── */
        .features {
            padding: 0 24px 80px;
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature-item {
            background: linear-gradient(135deg, rgba(196,18,48,0.06), rgba(17,7,16,0.8));
            border: 1px solid rgba(196,18,48,0.15);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: border-color 0.3s ease;
        }

        .feature-item:hover { border-color: rgba(196,18,48,0.4); }

        .feature-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--red-dim), var(--dark));
            border: 1px solid rgba(196,18,48,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .feature-text strong {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 3px;
            color: var(--white);
        }

        .feature-text p {
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.5;
            font-weight: 400;
        }

        /* ── BOTTOM CTA ── */
        .bottom-cta {
            text-align: center;
            padding: 0 24px 80px;
        }

        .bottom-cta h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .bottom-cta p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.7rem;
            color: rgba(140,106,111,0.4);
            letter-spacing: 1px;
        }

        /* ── ANIMATIONS ── */

        /* ── CHROME OVERLAY ── */
        .chrome-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4, 1, 3, 0.96);
            backdrop-filter: blur(12px);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            padding: 24
